            <div>
              <div className="events-empty-title">You haven't RSVP'd to anything yet</div>
              <div className="events-empty-sub">
                Browse upcoming sessions and RSVP to the ones you want to join — you'll get a reminder before each one starts.
              </div>
            </div>
            <div className="events-empty-actions">
              <button className="events-empty-btn" onClick={() => setView('all')}>
                See all events
              </button>
              <button className="events-empty-btn ghost" onClick={onCreate}>
                <Icon name="plus" size={13}/> Host one yourself
              </button>
            </div>
          </div>
        )
      ) : (
        <>
          {featured && (
            <section className="act-module" id="evt-live">
              <header className="act-module-header">
                <div>
                  <div className="act-module-eyebrow">
                    <span className="num" style={{ background: '#FF3B30' }}>
                      <span style={{
                        width: 6, height: 6, borderRadius: 999, background: '#fff',
                        animation: 'livePulse 1.2s ease-in-out infinite', display: 'inline-block'
                      }}/>
                    </span>
                    Live now

                </div>
                <div className="act-module-meta">
                  <span><strong>{featured.rsvp}</strong> watching</span>

              </header>
              <div className="event-featured" onClick={() => onOpenEvent && onOpenEvent(featured, false)} style={{ cursor: 'pointer' }}>
                <div className="event-featured-top">
                  <span className="event-featured-live">
                    <span className="dot"></span> Live now
                  </span>
                  <span className="event-featured-when">

                    <Icon name="video-fill" size={15}/> Join live now

              <section key={g.id} className="act-module" id={`evt-${g.id}`}>

                    <div className="act-module-name">{g.desc}</div>
                  </div>
                  <div className="act-module-meta">
                    <span><strong>{nonLive.length}</strong> upcoming</span>
                    {nextEvent && nextEvent.month && (
                      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                        <Icon name="calendar" size={11}/>
                        next {nextEvent.month} {nextEvent.day}
                      </span>
                    )}
                  </div>
                </header>
                <div className="events-grid">
                  {nonLive.map(e => (
                    <EventCard key={e.id} event={e} onOpen={onOpenEvent}/>
                  ))}
                </div>
              </section>
            );
          })}

          {PAST_EVENTS.length > 0 && (
            <section className="act-module" id="evt-past">
              <header className="act-module-header">
                <div>
                  <div className="act-module-eyebrow">
                    <Icon name="play-circle" size={12}/> Past
                  </div>
                  <div className="act-module-name">Replays available</div>
                </div>
                <div className="act-module-meta">
                  <span><strong>{PAST_EVENTS.length}</strong> {PAST_EVENTS.length === 1 ? 'replay' : 'replays'}</span>
                </div>
              </header>
              <div className="events-grid">
                {PAST_EVENTS.map(e => (
                  <EventCard key={e.id} event={e} past onOpen={onOpenEvent}/>
                ))}
              </div>
            </section>
          )}
        </>
      )}
    </>
  );
}

// ============== SUBMISSION THREAD MODAL ==============
function SubmissionThreadModal({ submission, submissions, onClose, onNavigate }) {
  const [draft, setDraft] = useState('');
  const [liked, setLiked] = useState(false);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft' && onNavigate) onNavigate(-1);
      if (e.key === 'ArrowRight' && onNavigate) onNavigate(1);
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose, onNavigate]);

  if (!submission) return null;
  const s = submission;
  const idx = submissions.findIndex(x => x.id === s.id);
  const total = submissions.length;

  // Build comment list including instructor feedback as the first pinned comment
  const comments = [];
  if (typeof s.instrFeedback === 'string') {
    comments.push({ author: 'Mira Chen', initials: 'MC', when: '1h', text: s.instrFeedback, instr: true });
  } else if (s.instrFeedback) {
    comments.push({ author: 'Mira Chen', initials: 'MC', when: '1h', text: "Beautiful work. Notes incoming after office hours \u2014 quick thought: the crumb structure tells me you're reading bulk well now. Keep going.", instr: true });
  }
  if (s.threadComments) comments.push(...s.threadComments);
  if (comments.length < 2) {
    comments.push({ author: 'Aliyah Reza', initials: 'AR', when: '30m', text: "Looks great \u2014 mind sharing your shaping process? Mine always deflates here." });
  }

  return (
    <div className="sub-thread-overlay" onClick={onClose}>
      <div className="sub-thread" onClick={(e) => e.stopPropagation()}>
        <div className="sub-thread-media">
          <div className="sub-thread-media-img" style={{ backgroundImage: `url(${s.photo})`, backgroundColor: '#0A0A0C' }}></div>
          <span className="sub-thread-counter">{idx + 1} / {total}</span>
          {idx > 0 && (
            <button className="sub-thread-arrow prev" onClick={() => onNavigate && onNavigate(-1)}>
              <span style={{ display: 'inline-flex', transform: 'rotate(90deg)' }}>
                <Icon name="chev-down" size={18} stroke={2}/>
              </span>
            </button>
          )}
          {idx < total - 1 && (
            <button className="sub-thread-arrow next" onClick={() => onNavigate && onNavigate(1)}>
              <span style={{ display: 'inline-flex', transform: 'rotate(-90deg)' }}>
                <Icon name="chev-down" size={18} stroke={2}/>
              </span>
            </button>
          )}
          {s.isVideo && (
            <div className="sub-cover-video-btn">
              <span className="play"><Icon name="play-solid" size={26}/></span>
            </div>
          )}
        </div>

        <div className="sub-thread-side">
          <div className="sub-thread-head">
            <Avatar initials={s.initials} size={36}/>
            <div className="sub-thread-head-info">
              <div className="sub-thread-head-name">{s.author}</div>
              <div className="sub-thread-head-sub">Cohort 04 · {s.when}</div>
            </div>
            <button className="sub-thread-close" onClick={onClose}>
              <Icon name="x" size={17}/>
            </button>
          </div>

          <div className="sub-thread-body">
            <div className="sub-thread-caption">{s.caption}</div>
            {s.specs && s.specs.length > 0 && (
              <div className="sub-thread-specs">
                {s.specs.map((sp, i) => (
                  <span key={i} className="sub-spec"><span className="lbl">{sp[0]}</span>{sp[1]}</span>
                ))}
              </div>
            )}

            <div className="sub-thread-actions">
              <button
                className={`post-action ${liked ? 'reacted-love' : ''}`}
                onClick={() => setLiked(v => !v)}
              >
                {liked ? <span style={{ fontSize: 15 }}>{'\u2764\ufe0f'}</span> : <Icon name="heart" size={15}/>}
                {s.likes + (liked ? 1 : 0)}
              </button>
              <button className="post-action">
                <Icon name="comment" size={15}/> {comments.length}
              </button>
              <button className="post-action">
                <Icon name="send" size={15}/> Share
              </button>
              <button className="post-action">
                <Icon name="bookmark" size={15}/>
              </button>
            </div>

            <div className="sub-thread-comments-label">{comments.length} comments</div>
            <div className="sub-thread-comments">
              {comments.map((c, i) => (
                <div key={i} className={`cmt ${c.instr ? 'instr' : ''}`}>
                  <Avatar initials={c.initials} size={30}/>
                  <div className="cmt-body">
                    <div>
                      <span className="cmt-author">
                        {c.author}
                        {c.instr && <span className="instr-badge">INSTR</span>}
                      </span>
                      <span className="cmt-when">· {c.when}</span>
                    </div>
                    <div className="cmt-text">{c.text}</div>
                    <div className="cmt-actions">
                      <span>Like</span>
                      <span>Reply</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="sub-thread-composer">
            <Avatar initials="ME" size={30}/>
            <input
              className="input"
              placeholder="Add a comment…"
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
            />
            <button className="send" disabled={!draft.trim()} onClick={() => setDraft('')}>
              <Icon name="send" size={14}/>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ActivitiesView({ onCreate, channels, onOpenActivity, onSubmit }) {
  const [view, setView] = useState('all'); // 'all' | 'mine'

  // Build per-module groupings from channels (excluding the 'all' aggregator)
  const moduleChannels = (channels || []).filter(c => c.id !== 'all');
  const modules = moduleChannels.map(c => {
    const num = c.id.replace('m', '');
    const name = c.label.replace(/^Module \d ·\s*/, '');
    const items = ACTIVITIES_LIST.filter(a => a.moduleId === c.id);
    return { id: c.id, num, name, items };
  }).filter(m => m.items.length > 0);

  const totalCount = ACTIVITIES_LIST.length;
  const mineCount = 0; // user hasn't submitted to anything yet

  return (
    <>
      <PageHero
        eyebrowKind="live"
        eyebrow={`${totalCount} activities · all open`}
        title="Activities"
        sub="Hands-on prompts for the community. Submit a photo, video, or write-up — others see your work and leave feedback."
      />

      <div className="act-toolbar">
        <div className="act-segmented">
          <button
            className={view === 'all' ? 'active' : ''}
            onClick={() => setView('all')}
          >
            All activities <span className="ct">{totalCount}</span>
          </button>
          <button
            className={view === 'mine' ? 'active' : ''}
            onClick={() => setView('mine')}
          >
            Submitted by me <span className="ct">{mineCount}</span>
          </button>
        </div>
        <span className="act-toolbar-spacer"></span>
        <button className="act-create" onClick={onCreate}>
          <Icon name="plus" size={13}/> Create activity
        </button>
      </div>

      {view === 'all' && modules.length > 4 && (
        <div className="act-toc" role="navigation" aria-label="Jump to module">
          <span className="act-toc-label">Jump to</span>
          {modules.map(m => (
            <a key={m.id} href={`#mod-${m.id}`}>
              <span className="num">M{m.num}</span>
              <span>{m.name}</span>
              <span className="ct">· {m.items.length}</span>
            </a>
          ))}
        </div>
      )}

      {view === 'mine' ? (
        <div className="events-empty">
          <div className="events-empty-icon">
            <Icon name="camera" size={28} stroke={1.4}/>
          </div>
          <div>
            <div className="events-empty-title">You haven't submitted to an activity yet</div>
            <div className="events-empty-sub">
              Submit to an open activity — your bake will show up in the cohort gallery and the instructor will leave feedback.
            </div>
          </div>
          <div className="events-empty-actions">
            <button className="events-empty-btn" onClick={() => setView('all')}>
              See all activities
            </button>
          </div>
        </div>
      ) : (
        modules.map(m => {
          const submitted = m.items.reduce((sum, a) => sum + (a.submissions || 0), 0);
          const total = m.items.reduce((sum, a) => sum + (a.total || 0), 0);
          const pct = total > 0 ? Math.round((submitted / total) * 100) : 0;
          return (
            <section key={m.id} className="act-module" id={`mod-${m.id}`}>
              <header className="act-module-header">
                <div>
                  <div className="act-module-eyebrow">
                    <span className="num">{m.num}</span>
                    Module {m.num}
                  </div>
                  <div className="act-module-name">{m.name}</div>
                </div>
                <div className="act-module-meta">
                  <span><strong>{m.items.length}</strong> {m.items.length === 1 ? 'activity' : 'activities'}</span>
                  <span className="act-module-progress">
                    <span>{pct}%</span>
                    <span className="act-module-progress-bar"><div style={{ width: pct + '%' }}/></span>
                  </span>
                </div>
              </header>
              <div className="activities-grid">
                {m.items.map(a => (
                  <ActivityListCard
                    key={a.id}
                    activity={a}
                    onOpen={onOpenActivity}
                    onSubmit={onSubmit}
                  />
                ))}
              </div>
            </section>
          );
        })
      )}
    </>
  );
}

function HomeFeed({ channel, channels, tag, setTag, editMode, onOpenComposer }) {
  const ch = channels.find(c => c.id === channel) || channels[0];
  const isAll = channel === 'all';

  let visible = FEED.filter(p => {
    if (!isAll && p.module !== channel) return false;
    if (tag !== 'all' && (!p.tag || p.tag.id !== tag)) return false;
    return true;
  });

  // Always show pinned post first
  visible = [...visible].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

  const channelLabel = (m) => {
    const c = channels.find(x => x.id === m);
    if (!c) return '';
    return c.label.replace(/^Module \d · /, 'Module ');
  };

  return (
    <>
      <PageHero
        eyebrowKind="live"
        eyebrow="236 members · 14 active today"
        title={isAll ? 'Community' : ch.label}
        sub={isAll
          ? 'Discussions, wins, and questions from across the community. New activities every week.'
          : `Discussions and questions on ${ch.label.replace(/^Module \d · /, '')}.`}
      />

      <Composer onOpen={onOpenComposer}/>

      <div className="filterbar">
        {TAGS.map(t => (
          <button
            key={t.id}
            className={`filter-chip ${tag === t.id ? 'active' : ''}`}
            onClick={() => setTag(t.id)}

            {t.label}<span className="ct">{t.count}</span>
          </button>
        ))}
        <span className="filter-spacer"></span>
        <button className="sort-btn">
          Recent <Icon name="chev-down" size={12}/>
        </button>
      </div>

      <div className="feed-list">
        {visible.length === 0 ? (
          <div className="post" style={{ textAlign: 'center', color: 'var(--muted)' }}>

          </div>
        ) : visible.map(p => (
          <PostCard key={p.id} post={p} channelLabel={channelLabel(p.module)}/>

      <Icon name="pencil" size={13}/>
      {editMode ? 'Editing' : 'Edit'}
    </button>
  );
}

// ============== NOTIFICATIONS VIEW ==============
function NotificationsView({ onOpenEvent, onOpenActivity }) {
  const [filter, setFilter] = useState('all');
  const [items, setItems] = useState(NOTIFICATIONS);

  const counts = useMemo(() => {
    const base = { all: items.length, unread: items.filter(i => i.unread).length };
    const buckets = {
      mentions: items.filter(i => i.type === 'mention').length,
      comments: items.filter(i => i.type === 'comment' || i.type === 'feedback').length,
      activity: items.filter(i => i.type === 'heart' || i.type === 'feature' || i.type === 'activity').length,
      events: items.filter(i => i.type === 'event-live' || i.type === 'event-rsvp').length,
    };
    return { ...base, ...buckets };
  }, [items]);

  const visible = useMemo(() => {
    if (filter === 'all') return items;
    if (filter === 'unread') return items.filter(i => i.unread);
    if (filter === 'mentions') return items.filter(i => i.type === 'mention');
    if (filter === 'comments') return items.filter(i => i.type === 'comment' || i.type === 'feedback');
    if (filter === 'activity') return items.filter(i => i.type === 'heart' || i.type === 'feature' || i.type === 'activity');
    if (filter === 'events') return items.filter(i => i.type === 'event-live' || i.type === 'event-rsvp');
    return items;
  }, [items, filter]);

  const grouped = useMemo(() => {
    const order = ['new', 'yesterday', 'earlier'];
    const labels = { new: 'New', yesterday: 'Yesterday', earlier: 'This week' };
    return order.map(k => ({ key: k, label: labels[k], items: visible.filter(v => v.bucket === k) })).filter(g => g.items.length > 0);
  }, [visible]);

  const markAllRead = () => setItems(arr => arr.map(i => ({ ...i, unread: false })));
  const toggleRead = (id) => setItems(arr => arr.map(i => i.id === id ? { ...i, unread: !i.unread } : i));
  const dismiss = (id) => setItems(arr => arr.filter(i => i.id !== id));

  const handleClick = (n) => {
    if (n.unread) setItems(arr => arr.map(i => i.id === n.id ? { ...i, unread: false } : i));
    if (n.targetType === 'event') {
      const ev = EVENTS.find(e => e.id === n.targetId) || PAST_EVENTS.find(e => e.id === n.targetId);
      if (ev && onOpenEvent) onOpenEvent(ev, !!PAST_EVENTS.find(e => e.id === n.targetId));
    } else if (n.targetType === 'activity') {
      const a = ACTIVITIES_LIST.find(x => x.id === n.targetId);
      if (a && onOpenActivity) onOpenActivity(a);
    } else if (n.targetType === 'submission' && n.targetId) {
      const a = ACTIVITIES_LIST.find(x => x.id === n.targetId);
      if (a && onOpenActivity) onOpenActivity(a);
    }
  };

  const filters = [
    { id: 'all', label: 'All', count: counts.all },
    { id: 'unread', label: 'Unread', count: counts.unread },
    { id: 'mentions', label: 'Mentions', count: counts.mentions, icon: 'at' },
    { id: 'comments', label: 'Comments', count: counts.comments, icon: 'comment' },
    { id: 'activity', label: 'Reactions', count: counts.activity, icon: 'heart' },
    { id: 'events', label: 'Events', count: counts.events, icon: 'calendar' },
  ];

  return (
    <div data-screen-label="Notifications">
      <div className="notif-head">
        <div className="notif-head-content">
          <div className="notif-head-title-row">
            <h1>Notifications</h1>
            {counts.unread > 0 && (
              <span className="notif-head-unread-pill">
                <span className="dot"></span> {counts.unread} new
              </span>
            )}
          </div>
          <div className="notif-head-sub">
            {counts.unread > 0
              ? `You have ${counts.unread} unread \u2014 mostly feedback from Mira and your cohort.`
              : "You're all caught up. Lovely."}
          </div>
          <div className="notif-head-actions" style={{ marginTop: 6 }}>
            <button className="notif-head-btn" onClick={markAllRead} disabled={counts.unread === 0}>
              <Icon name="check-double" size={13}/> Mark all read
            </button>
            <button className="notif-head-btn icon" title="Notification settings">
              <Icon name="settings" size={15}/>
            </button>
          </div>
        </div>
        <div className="notif-head-img">
          <button className="page-hero-img-add" type="button">
            <span className="page-hero-img-add-icon"><Icon name="image" size={18}/></span>
            <span>Add image</span>
          </button>
        </div>
      </div>

      <div className="notif-tabs">
        {filters.map(f => (
          <button
            key={f.id}
            className={`notif-tab ${filter === f.id ? 'active' : ''}`}
            onClick={() => setFilter(f.id)}
          >
            {f.icon && <Icon name={f.icon} size={13}/>}
            {f.label}
            <span className="ct">{f.count}</span>
          </button>
        ))}
      </div>

      {grouped.length === 0 ? (
        <div className="notif-empty">
          <div className="notif-empty-icon">
            <Icon name="bell" size={22}/>
          </div>
          <div className="notif-empty-title">Nothing here yet</div>
          <div className="notif-empty-sub">
            {filter === 'unread'
              ? "You're all caught up \u2014 nice work staying on top of feedback."
              : `No ${filter} to show right now. Check back after the next bake-along.`}
          </div>
        </div>
      ) : (
        grouped.map(g => (
          <div key={g.key}>
            <div className="notif-section-title">
              <span>{g.label}</span>
              <span className="ct">{g.items.length}</span>
              <span className="notif-section-title-divider"></span>
            </div>
            <div className="notif-list">
              {g.items.map(n => (
                <NotificationRow
                  key={n.id}
                  n={n}
                  onClick={() => handleClick(n)}
                  onToggleRead={(e) => { e.stopPropagation(); toggleRead(n.id); }}
                  onDismiss={(e) => { e.stopPropagation(); dismiss(n.id); }}
                />
              ))}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

function NotificationRow({ n, onClick, onToggleRead, onDismiss }) {
  return (
    <div className={`notif-row ${n.unread ? 'unread' : ''} ${n.type}`} onClick={onClick}>
      <div className="notif-avatar">
        {n.isSystem ? (
          <div className="notif-avatar-icon">
            <Icon name={n.icon || 'bell'} size={18}/>
          </div>
        ) : (
          <span className="av"><Avatar initials={n.initials} size={44}/></span>
        )}
        <span className={`notif-badge ${n.badge}`}>
          <Icon
            name={
              n.badge === 'heart' ? 'heart' :
              n.badge === 'comment' ? 'comment' :
              n.badge === 'mention' ? 'at' :
              n.badge === 'feature' ? 'award' :
              n.badge === 'feedback' ? 'check' :
              n.badge === 'event' ? 'calendar' :
              n.badge === 'member' ? 'users' :
              n.badge === 'activity' ? 'camera' : 'bell'
            }
            size={10} stroke={2.2}
          />
        </span>
      </div>

      <div className="notif-body">
        <div className="notif-text">
          {n.actor && (
            <>
              <strong>{n.actor}</strong>
              {n.instructor && <span className="post-author-badge" style={{ marginLeft: 5, verticalAlign: 'middle' }}>Instructor</span>}
              {' '}
            </>
          )}
          {n.text}
          {n.target && (
            <>
              {' '}<span className="target">{n.target}</span>
            </>
          )}
        </div>

        {n.quote && <div className="notif-quote">{n.quote}</div>}

        {n.eventCard && (
          <div className="notif-event-card">
            <div className="notif-event-card-cover" style={{ background: n.eventCard.cover }}></div>
            <div className="notif-event-card-info">
              <div className="notif-event-card-when">{n.eventCard.when}</div>
              <div className="notif-event-card-title">{n.eventCard.title}</div>
              <div className="notif-event-card-meta">{n.eventCard.meta}</div>
            </div>
          </div>
        )}

        {n.extraAvs && n.extraAvs.length > 0 && !n.quote && (
          <div className="notif-meta">
            <span className="av-stack" style={{ display: 'inline-flex' }}>
              {n.extraAvs.map((s, i) => (
                <span
                  key={i}
                  style={{
                    width: 18, height: 18, borderRadius: 999,
                    border: '2px solid #fff', overflow: 'hidden',
                    marginLeft: i === 0 ? 0 : -6, display: 'inline-block'
                  }}
                >
                  <Avatar initials={s} size={16}/>
                </span>
              ))}
            </span>
          </div>
        )}

        {n.actions && n.actions.length > 0 && (
          <div className="notif-cta">
            {n.actions.map((a, i) => (
              <button
                key={i}
                className={`notif-cta-btn ${a.primary ? 'primary' : ''}`}
                onClick={(e) => { e.stopPropagation(); onClick && onClick(); }}
              >
                {a.label}
              </button>
            ))}
          </div>
        )}
      </div>

      <div className="notif-right">
        <span className="notif-time">{n.when}</span>
        {n.unread && <span className="notif-unread-dot"></span>}
        <div className="notif-actions">
          <button className="notif-action" onClick={onToggleRead} title={n.unread ? 'Mark as read' : 'Mark as unread'}>
            <Icon name="check" size={13}/>
          </button>
          <button className="notif-action" onClick={onDismiss} title="Dismiss">
            <Icon name="x" size={13}/>
          </button>
        </div>
      </div>

      {!n.actions && n.thumb && (
        <div className="notif-thumb" style={{ backgroundImage: `url(${n.thumb})`, gridColumn: 3, gridRow: 1, marginTop: 22 }}></div>
      )}
    </div>
  );
}

  const upcoming = EVENTS.slice(0, 3);
  const featuredMembers = MEMBERS.slice(0, 5);

  return (
    <aside className="right-rail">
      <div className="rr-card">
        <div className="rr-card-head">
          <div className="rr-card-title">Upcoming events</div>
          <button className="rr-card-link" onClick={() => onGoToMembers && onGoToMembers('events')}>
            See all <span style={{ display: 'inline-flex', transform: 'rotate(-90deg)' }}><Icon name="chev-down" size={10} stroke={2.2}/></span>
          </button>
        </div>
        {upcoming.map(e => (
          <div key={e.id} className="rr-event" onClick={() => onOpenEvent && onOpenEvent(e, false)}>
            <div className={`rr-event-date ${e.live ? 'live' : ''}`}>
              <div className="rr-event-date-day">{e.day}</div>
              <div className="rr-event-date-month">{e.month}</div>

              <div className="rr-event-title">{e.title}</div>
              <div className="rr-event-meta">
                {e.live ? (
                  <span className="live-tag">Live now</span>
                ) : (
                  <span>{e.duration}</span>
                )}
                <span className="sep"></span>
                <span>{e.rsvp} {e.live ? 'watching' : 'going'}</span>

      <div className="rr-card">

          <div key={m.name} className="rr-member" onClick={() => onGoToMembers && onGoToMembers('members')}>

              {m.online && <span className="dot"></span>}

  );

// ============== APP ==============
function App() {
  const [editMode, setEditMode] = useState(false);
  const [view, setView] = useState('home');
  const [channel, setChannel] = useState('all');
  const [channels, setChannels] = useState(CHANNELS);
  const [tag, setTag] = useState('all');
  const [composerOpen, setComposerOpen] = useState(false);
  const [createEventOpen, setCreateEventOpen] = useState(false);
  const [createActivityOpen, setCreateActivityOpen] = useState(false);
  const [selectedActivity, setSelectedActivity] = useState(null);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [selectedEventPast, setSelectedEventPast] = useState(false);
  const [submitActivity, setSubmitActivity] = useState(null);

  // Clear activity detail when leaving the activities tab
  const goView = (v) => {
    setView(v);
    if (v !== 'activities') setSelectedActivity(null);
  };

  return (
    <div className="app" data-screen-label="Community">
      <EditButton editMode={editMode} setEditMode={setEditMode}/>
      <div className="layout">
        <LeftRail
          view={view} setView={goView}
          channel={channel} setChannel={setChannel}
          channels={channels} setChannels={setChannels}
          editMode={editMode}
        />
        <main className="main">
          {view === 'home' ? (
            <HomeFeed
              channel={channel} channels={channels}
              tag={tag} setTag={setTag}
              editMode={editMode}
              onOpenComposer={() => setComposerOpen(true)}
            />
          ) : view === 'events' ? (
            <EventsView
              onCreate={() => setCreateEventOpen(true)}
              onOpenEvent={(ev, past) => { setSelectedEvent(ev); setSelectedEventPast(!!past); }}
            />
          ) : view === 'activities' ? (
            selectedActivity ? (
              <ActivityDetailView
                activity={selectedActivity}
                onBack={() => setSelectedActivity(null)}
                onSubmit={(a) => setSubmitActivity(a)}
              />
            ) : (
              <ActivitiesView
                onCreate={() => setCreateActivityOpen(true)}
                channels={channels}
                onOpenActivity={(a) => setSelectedActivity(a)}
                onSubmit={(a) => setSubmitActivity(a)}
              />
            )
          ) : view === 'notifications' ? (
            <NotificationsView
              onOpenEvent={(ev, past) => { setSelectedEvent(ev); setSelectedEventPast(!!past); }}
              onOpenActivity={(a) => { setView('activities'); setSelectedActivity(a); }}
            />
          ) : (
            <MembersView/>
          )}
        </main>
        <RightRail
          onOpenEvent={(ev, past) => { setSelectedEvent(ev); setSelectedEventPast(!!past); }}
          onGoToMembers={(target) => goView(target || 'members')}
        />
      </div>
      <ComposerModal open={composerOpen} onClose={() => setComposerOpen(false)}/>
      <CreateEventModal open={createEventOpen} onClose={() => setCreateEventOpen(false)}/>
      <CreateActivityModal open={createActivityOpen} onClose={() => setCreateActivityOpen(false)} channels={channels}/>
      <SubmitActivityModal activity={submitActivity} onClose={() => setSubmitActivity(null)}/>
      <EventDetailModal
        event={selectedEvent}
        past={selectedEventPast}
        onClose={() => setSelectedEvent(null)}
      />
      {editMode && (
        <div className="edit-hint">
          <span className="dot"></span>
          Edit mode · click any text to rename
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
